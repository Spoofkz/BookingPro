name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: file:./prisma/test.db
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies (root or web)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f web/package-lock.json ]; then
            echo "Root package-lock.json missing; installing dependencies in web/ only."
            (cd web && npm ci)
          else
            echo "No package-lock.json found in root or web/"
            exit 1
          fi

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Prepare CI database
        run: |
          npx prisma db push --schema prisma/schema.prisma --force-reset
          node prisma/seed.mjs

      - name: Typecheck
        run: npx tsc --noEmit --incremental false

      - name: Security scan (secret scan + RBAC checks)
        run: node scripts/ci/security-scan.mjs

      - name: PRD-00 governance validation
        run: node scripts/qa/prd00-governance-check.mjs --write

      - name: Contract tests
        run: node --test tests/contracts.api.test.mjs

      - name: API regression suites (serial)
        run: node scripts/ci/run-api-tests.mjs

